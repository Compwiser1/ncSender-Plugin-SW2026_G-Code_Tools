name: Build and Release Plugin

# Triggers on any tag push matching v*.*.* (e.g. v1.0.0). Typical flow is:
#   1. Bump manifest.json "version" (see .scripts/bump-release.sh)
#   2. Commit as: chore: create new release vX.X.X
#   3. Tag the commit: git tag vX.X.X
#   4. Push both: git push && git push --tags
# The push of the tag is what triggers this workflow.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read plugin id and version from manifest.json
        id: manifest
        run: |
          PLUGIN_ID=$(jq -r '.id' manifest.json)
          MANIFEST_VERSION=$(jq -r '.version' manifest.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Plugin ID: $PLUGIN_ID"
          echo "manifest.json version: $MANIFEST_VERSION"
          echo "Tag version: $TAG_VERSION"

          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest.json version ${MANIFEST_VERSION}. Update manifest.json before tagging."
            exit 1
          fi

          echo "plugin_id=$PLUGIN_ID" >> "$GITHUB_OUTPUT"
          echo "version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage plugin files
        run: |
          PLUGIN_ID="${{ steps.manifest.outputs.plugin_id }}"
          mkdir -p "tmp/$PLUGIN_ID"
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.scripts' \
            --exclude 'dist' \
            --exclude 'tmp' \
            --exclude '.gitignore' \
            --exclude 'latest_release.md' \
            ./ "tmp/$PLUGIN_ID/"

      - name: Build release zip
        id: zip
        run: |
          PLUGIN_ID="${{ steps.manifest.outputs.plugin_id }}"
          VERSION="${{ steps.manifest.outputs.version }}"
          mkdir -p dist
          ZIP_NAME="${PLUGIN_ID}-v${VERSION}.zip"
          (cd tmp && zip -r "../dist/${ZIP_NAME}" "${PLUGIN_ID}")
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_path=dist/${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Get release notes
        id: notes
        run: |
          if [ -f latest_release.md ]; then
            {
              echo 'body<<RELEASE_NOTES_EOF'
              cat latest_release.md
              echo 'RELEASE_NOTES_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${{ steps.manifest.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.manifest.outputs.plugin_id }} v${{ steps.manifest.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          files: ${{ steps.zip.outputs.zip_path }}
          fail_on_unmatched_files: true

      # Optional: post a notification when a release goes out. Only runs if
      # a DISCORD_WEBHOOK_URL secret is configured on the repo — harmless
      # no-op otherwise. Remove this step if you don't want it.
      - name: Notify Discord (optional)
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"🚀 **${{ steps.manifest.outputs.plugin_id }} v${{ steps.manifest.outputs.version }}** released: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}\"}" \
            "$DISCORD_WEBHOOK_URL"
